<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Ejemplo 1 - Formulario GET</title>
</head>
<body>
    <h1>Ejemplo 1</h1>
    <br>
    <h2>Realiza un programa que reciba el nombre y la edad de una persona a traves de un formulario HTML utilizando el metodo GET y muestre un mensaje de bienvenida con el nombre y la edad ingresados.</h2>
    <br>
    <h3>Formulario</h3>
    <form action="ejemplo1.php" method="GET">
        <label for="nombre">Nombre:</label>
        <input type="text" id="nombre" name="nombre" required><br><br>
        <label for="edad">Edad:</label>
        <input type="number" id="edad" name="edad" required><br><br>
        <input type="submit" value="Enviar">
    </form>
</body>
</html>
