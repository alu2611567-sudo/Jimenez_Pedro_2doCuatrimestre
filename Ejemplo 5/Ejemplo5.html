<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Ejemplo 5</title>
</head>
<body>
    <h1>Ejemplo 5: Haz un programa que gestione las calificaciones de los estudiantes</h1>
    <br>
    <form action="Ejemplo5.php" method="post">
        <label>Nombre del estudiante:</label>
        <input type="text" name="nombre" required>
        <br>
        <label>Materia</label>
        <select name="materia" required>
            <option value="Matemáticas">Matemáticas</option>
            <option value="Fisica">Fisica</option>
            <option value="Ciencias">Ciencias</option>
            <option value="Historia">Historia</option>
            <option value="Inglés">Inglés</option>
            <option value="Geografía">Geografía</option>
        </select>
        <br>
        <label>Calificación:</label>
        <input type="number" name="calificacion" min="0" max="100" required>
        <br>
        <button>Enviar calificación</button>
    </form>
</body>
</html>
